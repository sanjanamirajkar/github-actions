<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanjana | DevOps Engineer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI';}
body{
background:#0a0a0a;color:white;
scroll-behavior:smooth;
}

/* Apple-like smooth section */
section{
padding:80px 20px;
text-align:center;
opacity:0;
transform:translateY(50px);
transition:1s;
}
section.show{
opacity:1;
transform:translateY(0);
}

/* Glass */
.container{
max-width:1000px;margin:auto;
background:rgba(255,255,255,0.05);
padding:30px;border-radius:20px;
backdrop-filter:blur(20px);
}

/* Heading */
h1{font-size:3rem}
h2{color:#00f7ff}

/* Buttons */
.btn{
display:inline-block;margin:10px;
padding:10px 20px;
background:#00f7ff;color:black;
border-radius:10px;
text-decoration:none;
transition:.3s;
}
.btn:hover{
transform:scale(1.1);
background:white;
}

/* Projects */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
padding:20px;border-radius:15px;
background:rgba(255,255,255,0.05);
transition:.3s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00f7ff;
}

/* Form */
input,textarea{
width:100%;padding:10px;margin:10px 0;
border:none;border-radius:10px;
}

/* Timeline */
.timeline{
border-left:2px solid #00f7ff;
padding-left:20px;
text-align:left;
}
.timeline div{
margin-bottom:20px;
}

/* Toggle */
.toggle{
position:fixed;top:20px;right:20px;
cursor:pointer;
}
.light{
background:white;color:black;
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌙</div>

<!-- HERO -->
<section class="show">
<div class="container">
<h1>Hi, I'm Sanjana 👋</h1>
<h2 id="typing"></h2>
<p>DevOps Engineer | CI/CD | Docker | Kubernetes</p>
</div>
</section>

<!-- PROJECTS -->
<section>
<div class="container">
<h2>Projects</h2>
<div class="projects">

<div class="card">
<h3>CI/CD Pipeline</h3>
<p>GitHub Actions automation</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>

<div class="card">
<h3>Docker App</h3>
<p>Containerized app</p>
<a href="#" class="btn">Live</a>
<a href="#" class="btn">Code</a>
</div>

</div>
</div>
</section>

<!-- TIMELINE -->
<section>
<div class="container">
<h2>Experience</h2>
<div class="timeline">
<div>Started DevOps Learning</div>
<div>Built CI/CD Projects</div>
<div>Working with Docker & Kubernetes</div>
</div>
</div>
</section>

<!-- CONTACT (REAL BACKEND) -->
<section>
<div class="container">
<h2>Contact Me</h2>

<form action="https://formspree.io/f/YOUR_ID" method="POST">
<input type="text" name="name" placeholder="Your Name" required>
<input type="email" name="email" placeholder="Email" required>
<textarea name="message" placeholder="Message"></textarea>
<button class="btn">Send</button>
</form>

</div>
</section>

<script>
// Typing animation
let text=["DevOps Engineer 🚀","Automation Specialist 💻"];
let i=0,j=0,del=false;
function type(){
let t=text[i];
document.getElementById("typing").textContent=t.substring(0,j);
j+=del?-1:1;
if(j>t.length){del=true}
if(j<0){del=false;i=(i+1)%text.length}
setTimeout(type,100);
}
type();

// Scroll animation
const sections=document.querySelectorAll("section");
window.addEventListener("scroll",()=>{
sections.forEach(sec=>{
let top=sec.getBoundingClientRect().top;
if(top<window.innerHeight-100){sec.classList.add("show")}
});
});

// Dark mode
function toggleMode(){
document.body.classList.toggle("light");
}
</script>

</body>
</html>
