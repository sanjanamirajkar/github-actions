name: my_workflow

on:
    push:
        branches: [main]

    workflow_dispatch:

        
permissions:
    pages: write
    id-token: write
    contents: read


jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
          - name: checkout pages
            uses: actions/checkout@v4

          - name: configure pages
            uses: actions/configure-pages@v4

          - name: upload pages
            uses: actions/upload-pages-artifact@v4
            with:
                path: "."

          - name: deploy pages
            uses: actions/deploy-pages@v4

    
